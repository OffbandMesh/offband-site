name: Configure Cloudflare custom domains

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  domains:
    runs-on: ubuntu-latest
    env:
      API: https://api.cloudflare.com/client/v4
      ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DNS_TOKEN: ${{ secrets.CLOUDFLARE_DNS_ZONE_TOKEN }}
      PROJECT: offband-site
      TARGET: offband-site.pages.dev
      ZONE: offband.org
    steps:
      - name: Attach custom domains + create DNS records
        run: |
          set -euo pipefail
          ZID=$(curl -s -H "Authorization: Bearer $DNS_TOKEN" "$API/zones?name=$ZONE" | jq -r '.result[0].id // empty')
          echo "zone $ZONE -> id ${ZID:0:6}…"
          [ -n "$ZID" ] || { echo "::error::could not resolve zone id — check CLOUDFLARE_DNS_ZONE_TOKEN scope (needs Zone:Read)"; exit 1; }
          for name in "$ZONE" "www.$ZONE"; do
            echo "── $name ──"
            REC=$(curl -s -H "Authorization: Bearer $DNS_TOKEN" "$API/zones/$ZID/dns_records?type=CNAME&name=$name" | jq -r '.result[0].id // empty')
            BODY="{\"type\":\"CNAME\",\"name\":\"$name\",\"content\":\"$TARGET\",\"proxied\":true}"
            if [ -n "$REC" ]; then
              curl -s -X PUT -H "Authorization: Bearer $DNS_TOKEN" -H "Content-Type: application/json" "$API/zones/$ZID/dns_records/$REC" --data "$BODY" \
                | jq -r 'if .success then "  DNS: updated" else "  DNS ERR: " + (.errors|tostring) end'
            else
              curl -s -X POST -H "Authorization: Bearer $DNS_TOKEN" -H "Content-Type: application/json" "$API/zones/$ZID/dns_records" --data "$BODY" \
                | jq -r 'if .success then "  DNS: created" else "  DNS ERR: " + (.errors|tostring) end'
            fi
            curl -s -X POST -H "Authorization: Bearer $PAGES_TOKEN" -H "Content-Type: application/json" "$API/accounts/$ACCOUNT_ID/pages/projects/$PROJECT/domains" --data "{\"name\":\"$name\"}" \
              | jq -r 'if .success then "  Pages: attached (" + (.result.status // "pending") + ")" else "  Pages: " + (.errors|tostring) end'
          done
          curl -s -X PATCH -H "Authorization: Bearer $DNS_TOKEN" -H "Content-Type: application/json" "$API/zones/$ZID/settings/always_use_https" --data '{"value":"on"}' \
            | jq -r 'if .success then "AlwaysHTTPS: on" else "AlwaysHTTPS (skip): " + (.errors|tostring) end'
          echo "configure-domains complete"
