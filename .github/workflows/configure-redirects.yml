name: Configure redirects + HTTPS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  redirects:
    runs-on: ubuntu-latest
    env:
      API: https://api.cloudflare.com/client/v4
      DNS_TOKEN: ${{ secrets.CLOUDFLARE_DNS_ZONE_TOKEN }}
      PAGES_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      ZONE: offband.org
    steps:
      - name: Always-HTTPS + canonical www->apex redirect
        run: |
          set -uo pipefail
          ZID=$(curl -s -H "Authorization: Bearer $DNS_TOKEN" "$API/zones?name=$ZONE" | jq -r '.result[0].id // empty')
          echo "zone id ${ZID:0:6}…"
          [ -n "$ZID" ] || { echo "::error::could not resolve zone id"; exit 1; }

          run() { # label token method url body
            local out
            if [ -n "$5" ]; then
              out=$(curl -s -X "$3" -H "Authorization: Bearer $2" -H "Content-Type: application/json" "$4" --data "$5")
            else
              out=$(curl -s -X "$3" -H "Authorization: Bearer $2" "$4")
            fi
            if echo "$out" | jq -e '.success == true' >/dev/null 2>&1; then
              echo "  $1: OK"; return 0
            else
              echo "  $1: FAIL $(echo "$out" | jq -c '.errors' 2>/dev/null)"; return 1
            fi
          }

          echo "=== Always Use HTTPS ==="
          run "always_https via dns-token" "$DNS_TOKEN" PATCH "$API/zones/$ZID/settings/always_use_https" '{"value":"on"}' \
            || run "always_https via pages-token" "$PAGES_TOKEN" PATCH "$API/zones/$ZID/settings/always_use_https" '{"value":"on"}' \
            || echo "  >> NEEDS a token with 'Zone → Zone Settings: Edit'"

          echo "=== www -> apex 301 (preserve path + query) ==="
          RBODY='{"rules":[{"expression":"(http.host eq \"www.offband.org\")","description":"www to apex canonical","action":"redirect","action_parameters":{"from_value":{"target_url":{"expression":"concat(\"https://offband.org\", http.request.uri.path)"},"status_code":301,"preserve_query_string":true}}}]}'
          URL="$API/zones/$ZID/rulesets/phases/http_request_dynamic_redirect/entrypoint"
          run "redirect via dns-token" "$DNS_TOKEN" PUT "$URL" "$RBODY" \
            || run "redirect via pages-token" "$PAGES_TOKEN" PUT "$URL" "$RBODY" \
            || echo "  >> NEEDS a token with 'Zone → Dynamic Redirect: Edit'"
          echo "configure-redirects complete"
