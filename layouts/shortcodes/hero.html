<section class="hero"><div class="wrap">
  {{ with .Get "logo" }}<img class="hero-logo" src="{{ . }}" alt="Offband">{{ end }}
  {{ with .Get "tagline" }}<div class="tagline">{{ . }}</div>{{ end }}
  {{ with .Get "title" }}<h1>{{ . }}</h1>{{ end }}
  {{ with .Get "lead" }}<p class="lead">{{ . }}</p>{{ end }}
  {{ .Inner }}
</div></section>
